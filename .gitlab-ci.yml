stages:
  - deploy

deploy_backend:
  stage: deploy
  only:
    - main
  before_script:
    - apt-get update -y
    - apt-get install -y openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $EC2_HOST >> ~/.ssh/known_hosts

  script:
    - ssh $EC2_USER@$EC2_HOST "
        cd $PROJECT_PATH &&
        git pull origin main &&
        npm install &&
        pm2 restart server || pm2 start src/server.js --name server
      "