name: Deploy Backend

on:
  push:
    branches: ["main"]

jobs:
  deploy_backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (SSH + rsync)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openssh-client rsync

      # ✅ SSH SETUP (FIXED + VALIDATION)
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "EC2_HOST is empty ❌"
            exit 1
          fi

          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ✅ SSH CONFIG (CLEAN)
      - name: Configure SSH
        run: |
          echo "Host *" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_ed25519" >> ~/.ssh/config

      # ✅ RELEASE VARIABLE (SAFE)
      - name: Set release variable
        run: |
          RELEASE=$(date +%s)
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "Deploying release: $RELEASE"

      # ✅ CREATE RELEASE DIR
      - name: Create release directory
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
          "mkdir -p ${{ secrets.PROJECT_PATH }}/releases/$RELEASE"

      # ✅ RSYNC DEPLOY
      - name: Rsync files
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='logs' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.PROJECT_PATH }}/releases/$RELEASE

      # ✅ INSTALL + START (NO DOWNTIME VERSION)
      - name: Install & Start Backend
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            set -e

            cd ${{ secrets.PROJECT_PATH }}/releases/$RELEASE/backend

            npm ci --omit=dev

            # ensure .env exists
            if [ ! -f '${{ secrets.PROJECT_PATH }}/shared/.env' ]; then
              echo '.env missing ❌'
              exit 1
            fi

            # switch current release
            ln -sfn ${{ secrets.PROJECT_PATH }}/releases/$RELEASE ${{ secrets.PROJECT_PATH }}/current
            ln -sfn ${{ secrets.PROJECT_PATH }}/shared/.env ${{ secrets.PROJECT_PATH }}/current/backend/.env

            # restart safely (no downtime crash)
            pm2 restart server || pm2 start src/server.js --name server

            pm2 save
          "

      # ✅ CLEANUP OLD RELEASES
      - name: Cleanup old releases
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            cd ${{ secrets.PROJECT_PATH }}/releases
            ls -dt */ | tail -n +4 | xargs -r rm -rf
          "

      # ✅ DISK SAFETY
      - name: Disk safety cleanup
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            USAGE=\$(df / | awk 'NR==2 {print \$5}' | sed 's/%//')

            if [ \"\$USAGE\" -gt 85 ]; then
              echo 'Disk usage high, cleaning more...'
              cd ${{ secrets.PROJECT_PATH }}/releases
              ls -dt */ | tail -n +3 | xargs -r rm -rf
            fi
          "