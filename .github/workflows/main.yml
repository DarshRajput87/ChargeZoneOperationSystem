name: Deploy Backend

on:
  push:
    branches: ["main"]

jobs:
  deploy_backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (SSH + rsync)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openssh-client rsync

      # ✅ SSH SETUP (ROBUST)
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          HOST="${{ secrets.EC2_HOST }}"

          if [ -z "$HOST" ]; then
            echo "EC2_HOST is empty ❌"
            exit 1
          fi

          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          echo "Host *" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_ed25519" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      # ✅ RELEASE VARIABLE
      - name: Set release variable
        run: |
          RELEASE=$(date +%s)
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "Deploying release: $RELEASE"

      # ✅ CREATE RELEASE DIR
      - name: Create release directory
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
          "mkdir -p ${{ secrets.PROJECT_PATH }}/releases/$RELEASE"

      # ✅ RSYNC DEPLOY (SAFER)
      - name: Rsync files
        run: |
          rsync -az \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='logs' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.PROJECT_PATH }}/releases/$RELEASE

      # ✅ INSTALL + START (FIXED)
      - name: Install & Start Backend
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            set -e

            # switch to new release
            ln -sfn ${{ secrets.PROJECT_PATH }}/releases/$RELEASE ${{ secrets.PROJECT_PATH }}/current

            cd ${{ secrets.PROJECT_PATH }}/current/backend

            npm ci --omit=dev

            # ensure .env exists
            if [ ! -f '${{ secrets.PROJECT_PATH }}/shared/.env' ]; then
              echo '.env missing ❌'
              exit 1
            fi

            ln -sfn ${{ secrets.PROJECT_PATH }}/shared/.env .env

            # restart app safely
            pm2 restart backend || pm2 start src/server.js --name backend 

            pm2 save
          "

      # ✅ CLEANUP OLD RELEASES
      - name: Cleanup old releases
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            cd ${{ secrets.PROJECT_PATH }}/releases
            ls -dt */ | tail -n +4 | xargs -r rm -rf
          "

      # ✅ DISK SAFETY
      - name: Disk safety cleanup
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            USAGE=\$(df / | awk 'NR==2 {print \$5}' | sed 's/%//')

            if [ \"\$USAGE\" -gt 85 ]; then
              echo 'Disk usage high, cleaning more...'
              cd ${{ secrets.PROJECT_PATH }}/releases
              ls -dt */ | tail -n +3 | xargs -r rm -rf
            fi
          "